<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" width="1200" height="1500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <!-- Background base -->
  <rect width="1200" height="1500" fill="#0F1115"/>

  <!-- Subtle background grid pattern -->
  <g stroke="#1A1D26" stroke-width="1" opacity="0.6">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="0" y1="800" x2="1200" y2="800"/>
    <line x1="0" y1="900" x2="1200" y2="900"/>
    <line x1="0" y1="1000" x2="1200" y2="1000"/>
    <line x1="0" y1="1100" x2="1200" y2="1100"/>
    <line x1="0" y1="1200" x2="1200" y2="1200"/>
    <line x1="0" y1="1300" x2="1200" y2="1300"/>
    <line x1="0" y1="1400" x2="1200" y2="1400"/>
    <line x1="100" y1="0" x2="100" y2="1500"/>
    <line x1="200" y1="0" x2="200" y2="1500"/>
    <line x1="300" y1="0" x2="300" y2="1500"/>
    <line x1="400" y1="0" x2="400" y2="1500"/>
    <line x1="500" y1="0" x2="500" y2="1500"/>
    <line x1="600" y1="0" x2="600" y2="1500"/>
    <line x1="700" y1="0" x2="700" y2="1500"/>
    <line x1="800" y1="0" x2="800" y2="1500"/>
    <line x1="900" y1="0" x2="900" y2="1500"/>
    <line x1="1000" y1="0" x2="1000" y2="1500"/>
    <line x1="1100" y1="0" x2="1100" y2="1500"/>
  </g>

  <!-- Top header bar -->
  <rect x="0" y="0" width="1200" height="80" fill="#1A1D26"/>
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#2C3354" stroke-width="1"/>

  <!-- Top-left: logo mark - orange iso-pipe elbow + welder mask -->
  <g transform="translate(40, 20)">
    <!-- Pipe elbow path -->
    <path d="M 0 30 L 20 30 Q 40 30 40 10 L 40 -5" stroke="#F5A623" stroke-width="6" fill="none" stroke-linecap="square"/>
    <circle cx="0" cy="30" r="4" fill="#F5A623"/>
    <circle cx="40" cy="-5" r="4" fill="#F5A623"/>
    <!-- Welder mask silhouette -->
    <path d="M 55 5 L 90 5 L 90 28 L 85 35 L 60 35 L 55 28 Z" fill="#E8ECF0"/>
    <rect x="62" y="14" width="22" height="8" fill="#0F1115"/>
    <rect x="62" y="14" width="22" height="8" fill="#2ECC71" opacity="0.5"/>
  </g>
  <text x="155" y="48" fill="#E8ECF0" font-size="20" font-weight="800" letter-spacing="3">FITTER WELDER PRO</text>

  <!-- Top-right meta -->
  <text x="1160" y="35" fill="#9BA3C7" font-size="13" font-weight="600" text-anchor="end" letter-spacing="2">OPINIE TERENOWE</text>
  <text x="1160" y="58" fill="#55607A" font-size="11" font-weight="500" text-anchor="end" letter-spacing="2">FIELD TESTIMONIAL · 05/12</text>

  <!-- Section: Dominant visual - vertical pipe spool with tape measure -->
  <g transform="translate(600, 280)">
    <!-- Pipe spool: vertical pipe with two flanges -->

    <!-- Top flange -->
    <ellipse cx="0" cy="-180" rx="95" ry="22" fill="#1A1D26" stroke="#E8ECF0" stroke-width="2.5"/>
    <ellipse cx="0" cy="-180" rx="95" ry="22" fill="none" stroke="#2C3354" stroke-width="1"/>
    <!-- Bolt holes top flange -->
    <circle cx="-70" cy="-180" r="4" fill="#0F1115" stroke="#9BA3C7" stroke-width="1"/>
    <circle cx="-35" cy="-185" r="4" fill="#0F1115" stroke="#9BA3C7" stroke-width="1"/>
    <circle cx="0" cy="-187" r="4" fill="#0F1115" stroke="#9BA3C7" stroke-width="1"/>
    <circle cx="35" cy="-185" r="4" fill="#0F1115" stroke="#9BA3C7" stroke-width="1"/>
    <circle cx="70" cy="-180" r="4" fill="#0F1115" stroke="#9BA3C7" stroke-width="1"/>

    <!-- Pipe body -->
    <rect x="-55" y="-170" width="110" height="270" fill="#1A1D26" stroke="#E8ECF0" stroke-width="2.5"/>
    <!-- Inner shadow lines for cylindrical look -->
    <line x1="-40" y1="-168" x2="-40" y2="98" stroke="#2C3354" stroke-width="1"/>
    <line x1="40" y1="-168" x2="40" y2="98" stroke="#2C3354" stroke-width="1"/>
    <line x1="-25" y1="-168" x2="-25" y2="98" stroke="#55607A" stroke-width="0.5" opacity="0.4"/>
    <line x1="25" y1="-168" x2="25" y2="98" stroke="#55607A" stroke-width="0.5" opacity="0.4"/>

    <!-- Weld seam middle -->
    <path d="M -55 -40 Q -50 -42 -45 -40 T -35 -40 T -25 -40 T -15 -40 T -5 -40 T 5 -40 T 15 -40 T 25 -40 T 35 -40 T 45 -40 T 55 -40" stroke="#F5A623" stroke-width="2" fill="none" opacity="0.85"/>

    <!-- Bottom flange -->
    <ellipse cx="0" cy="100" rx="95" ry="22" fill="#1A1D26" stroke="#E8ECF0" stroke-width="2.5"/>
    <!-- Bolt holes bottom flange -->
    <circle cx="-70" cy="100" r="4" fill="#0F1115" stroke="#9BA3C7" stroke-width="1"/>
    <circle cx="-35" cy="105" r="4" fill="#0F1115" stroke="#9BA3C7" stroke-width="1"/>
    <circle cx="0" cy="107" r="4" fill="#0F1115" stroke="#9BA3C7" stroke-width="1"/>
    <circle cx="35" cy="105" r="4" fill="#0F1115" stroke="#9BA3C7" stroke-width="1"/>
    <circle cx="70" cy="100" r="4" fill="#0F1115" stroke="#9BA3C7" stroke-width="1"/>

    <!-- Tape measure wrapped around pipe at top -->
    <rect x="-80" y="-95" width="160" height="14" fill="#E8C14B" stroke="#0F1115" stroke-width="1.5"/>
    <!-- Tape ticks -->
    <line x1="-72" y1="-95" x2="-72" y2="-87" stroke="#0F1115" stroke-width="1.2"/>
    <line x1="-60" y1="-95" x2="-60" y2="-89" stroke="#0F1115" stroke-width="0.8"/>
    <line x1="-48" y1="-95" x2="-48" y2="-89" stroke="#0F1115" stroke-width="0.8"/>
    <line x1="-36" y1="-95" x2="-36" y2="-87" stroke="#0F1115" stroke-width="1.2"/>
    <line x1="-24" y1="-95" x2="-24" y2="-89" stroke="#0F1115" stroke-width="0.8"/>
    <line x1="-12" y1="-95" x2="-12" y2="-89" stroke="#0F1115" stroke-width="0.8"/>
    <line x1="0" y1="-95" x2="0" y2="-87" stroke="#0F1115" stroke-width="1.2"/>
    <line x1="12" y1="-95" x2="12" y2="-89" stroke="#0F1115" stroke-width="0.8"/>
    <line x1="24" y1="-95" x2="24" y2="-89" stroke="#0F1115" stroke-width="0.8"/>
    <line x1="36" y1="-95" x2="36" y2="-87" stroke="#0F1115" stroke-width="1.2"/>
    <line x1="48" y1="-95" x2="48" y2="-89" stroke="#0F1115" stroke-width="0.8"/>
    <line x1="60" y1="-95" x2="60" y2="-89" stroke="#0F1115" stroke-width="0.8"/>
    <line x1="72" y1="-95" x2="72" y2="-87" stroke="#0F1115" stroke-width="1.2"/>
    <text x="-72" y="-78" fill="#0F1115" font-size="6" font-weight="700" text-anchor="middle">0</text>
    <text x="-36" y="-78" fill="#0F1115" font-size="6" font-weight="700" text-anchor="middle">50</text>
    <text x="0" y="-78" fill="#0F1115" font-size="6" font-weight="700" text-anchor="middle">100</text>
    <text x="36" y="-78" fill="#0F1115" font-size="6" font-weight="700" text-anchor="middle">150</text>
    <text x="72" y="-78" fill="#0F1115" font-size="6" font-weight="700" text-anchor="middle">200</text>

    <!-- Tape hanging down -->
    <rect x="-80" y="-81" width="14" height="120" fill="#E8C14B" stroke="#0F1115" stroke-width="1.2"/>
    <line x1="-80" y1="-65" x2="-66" y2="-65" stroke="#0F1115" stroke-width="0.6"/>
    <line x1="-80" y1="-50" x2="-66" y2="-50" stroke="#0F1115" stroke-width="0.6"/>
    <line x1="-80" y1="-35" x2="-66" y2="-35" stroke="#0F1115" stroke-width="0.6"/>
    <line x1="-80" y1="-20" x2="-66" y2="-20" stroke="#0F1115" stroke-width="0.6"/>
    <line x1="-80" y1="-5" x2="-66" y2="-5" stroke="#0F1115" stroke-width="0.6"/>
    <line x1="-80" y1="10" x2="-66" y2="10" stroke="#0F1115" stroke-width="0.6"/>
    <line x1="-80" y1="25" x2="-66" y2="25" stroke="#0F1115" stroke-width="0.6"/>

    <!-- Tape measure end hook -->
    <rect x="-83" y="38" width="20" height="6" fill="#E8ECF0" stroke="#0F1115" stroke-width="1"/>

    <!-- Spec labels -->
    <text x="120" y="-175" fill="#9BA3C7" font-size="14" font-weight="700" letter-spacing="1.5">DN 150</text>
    <text x="120" y="-156" fill="#55607A" font-size="11" font-weight="500" letter-spacing="1">SCH 40 · A106 GR.B</text>

    <text x="120" y="-95" fill="#9BA3C7" font-size="14" font-weight="700" letter-spacing="1.5">L = 2350 mm</text>
    <text x="120" y="-76" fill="#55607A" font-size="11" font-weight="500" letter-spacing="1">CUT TO LENGTH</text>

    <text x="120" y="-40" fill="#F5A623" font-size="14" font-weight="700" letter-spacing="1.5">WELD · JK-014</text>
    <text x="120" y="-21" fill="#55607A" font-size="11" font-weight="500" letter-spacing="1">AMP 145 · 320°C</text>

    <text x="120" y="100" fill="#9BA3C7" font-size="14" font-weight="700" letter-spacing="1.5">FLANGE WN</text>
    <text x="120" y="119" fill="#55607A" font-size="11" font-weight="500" letter-spacing="1">PN16 · RF · 8 BOLTS</text>

    <!-- Left side annotations -->
    <text x="-200" y="-175" fill="#55607A" font-size="11" font-weight="500" text-anchor="end" letter-spacing="1">SPOOL #04</text>
    <text x="-200" y="-156" fill="#55607A" font-size="10" font-weight="500" text-anchor="end" letter-spacing="0.5">REV. 02</text>
    <text x="-200" y="100" fill="#55607A" font-size="11" font-weight="500" text-anchor="end" letter-spacing="1">QA · OK</text>
    <text x="-200" y="119" fill="#2ECC71" font-size="10" font-weight="700" text-anchor="end" letter-spacing="0.5">PASSED</text>

    <!-- Dimension line on right -->
    <line x1="105" y1="-180" x2="105" y2="100" stroke="#55607A" stroke-width="0.8" stroke-dasharray="3,3"/>
  </g>

  <!-- Divider line above quote -->
  <line x1="120" y1="540" x2="1080" y2="540" stroke="#2C3354" stroke-width="1"/>
  <rect x="540" y="528" width="120" height="24" fill="#0F1115"/>
  <text x="600" y="545" fill="#9BA3C7" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="3">CYTAT · QUOTE</text>

  <!-- Middle section: Pull-quote -->
  <!-- Giant opening quotation mark (orange serif) -->
  <text x="170" y="780" fill="#F5A623" font-size="320" font-weight="900" font-family="Georgia, Cambria, Times New Roman, serif" opacity="0.95">&#8220;</text>

  <!-- Giant closing quotation mark (orange serif) -->
  <text x="970" y="980" fill="#F5A623" font-size="320" font-weight="900" font-family="Georgia, Cambria, Times New Roman, serif" opacity="0.95">&#8221;</text>

  <!-- PL caption - big, weight 900 -->
  <text x="600" y="770" fill="#E8ECF0" font-size="92" font-weight="900" text-anchor="middle" letter-spacing="-1">3 minuty zamiast 30.</text>

  <!-- EN caption - smaller -->
  <text x="600" y="850" fill="#9BA3C7" font-size="46" font-weight="600" text-anchor="middle" font-style="italic" letter-spacing="0.5">3 minutes instead of 30.</text>

  <!-- Decorative underline accent below EN -->
  <line x1="450" y1="888" x2="750" y2="888" stroke="#F5A623" stroke-width="3"/>
  <circle cx="600" cy="888" r="5" fill="#F5A623"/>

  <!-- Attribution -->
  <text x="600" y="950" fill="#E8C14B" font-size="22" font-weight="700" text-anchor="middle" letter-spacing="2">— monter rurociągów, Gdańsk</text>
  <text x="600" y="982" fill="#55607A" font-size="17" font-weight="500" text-anchor="middle" font-style="italic" letter-spacing="1.5">pipe fitter, Gdansk</text>

  <!-- Sub-stats row -->
  <g transform="translate(600, 1060)">
    <!-- Card 1 -->
    <rect x="-440" y="0" width="270" height="110" fill="#1A1D26" stroke="#2C3354" stroke-width="1" rx="6"/>
    <text x="-305" y="32" fill="#9BA3C7" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="2">ISO · LENGTH</text>
    <text x="-305" y="75" fill="#E8ECF0" font-size="36" font-weight="900" text-anchor="middle">3 min</text>
    <text x="-305" y="98" fill="#55607A" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="1">PARSER + AUTO-SUM</text>

    <!-- Card 2 -->
    <rect x="-135" y="0" width="270" height="110" fill="#1A1D26" stroke="#F5A623" stroke-width="1.5" rx="6"/>
    <text x="0" y="32" fill="#F5A623" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="2">RANGE · DN</text>
    <text x="0" y="75" fill="#E8ECF0" font-size="36" font-weight="900" text-anchor="middle">15–300</text>
    <text x="0" y="98" fill="#55607A" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="1">SCH 10S–160 · A106</text>

    <!-- Card 3 -->
    <rect x="170" y="0" width="270" height="110" fill="#1A1D26" stroke="#2C3354" stroke-width="1" rx="6"/>
    <text x="305" y="32" fill="#9BA3C7" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="2">STAMP · QA</text>
    <text x="305" y="75" fill="#2ECC71" font-size="36" font-weight="900" text-anchor="middle">WP-022</text>
    <text x="305" y="98" fill="#55607A" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="1">220 AMP · 685°C MAX</text>
  </g>

  <!-- Workshop data strip -->
  <g transform="translate(600, 1240)" opacity="0.85">
    <text x="-440" y="0" fill="#55607A" font-size="11" font-weight="600" letter-spacing="2">L1: 100 mm</text>
    <text x="-340" y="0" fill="#55607A" font-size="11" font-weight="600" letter-spacing="2">·</text>
    <text x="-310" y="0" fill="#55607A" font-size="11" font-weight="600" letter-spacing="2">L2: 1850 mm</text>
    <text x="-180" y="0" fill="#55607A" font-size="11" font-weight="600" letter-spacing="2">·</text>
    <text x="-145" y="0" fill="#55607A" font-size="11" font-weight="600" letter-spacing="2">L3: 4280 mm</text>
    <text x="-10" y="0" fill="#55607A" font-size="11" font-weight="600" letter-spacing="2">·</text>
    <text x="25" y="0" fill="#F5A623" font-size="11" font-weight="700" letter-spacing="2">AMP 80–220</text>
    <text x="195" y="0" fill="#55607A" font-size="11" font-weight="600" letter-spacing="2">·</text>
    <text x="225" y="0" fill="#55607A" font-size="11" font-weight="600" letter-spacing="2">°C 100–900</text>
    <text x="365" y="0" fill="#55607A" font-size="11" font-weight="600" letter-spacing="2">·</text>
    <text x="395" y="0" fill="#2ECC71" font-size="11" font-weight="700" letter-spacing="2">JK-014 ✓</text>
  </g>

  <!-- Bottom footer area -->
  <line x1="0" y1="1320" x2="1200" y2="1320" stroke="#2C3354" stroke-width="1"/>

  <!-- Bottom-left: wordmark with logo -->
  <g transform="translate(60, 1370)">
    <!-- Logo mark mini -->
    <path d="M 0 30 L 18 30 Q 36 30 36 12 L 36 0" stroke="#F5A623" stroke-width="5" fill="none" stroke-linecap="square"/>
    <circle cx="0" cy="30" r="3.5" fill="#F5A623"/>
    <circle cx="36" cy="0" r="3.5" fill="#F5A623"/>
    <!-- Welder mask silhouette -->
    <path d="M 48 8 L 78 8 L 78 28 L 73 34 L 53 34 L 48 28 Z" fill="#E8ECF0"/>
    <rect x="54" y="16" width="18" height="7" fill="#0F1115"/>
    <rect x="54" y="16" width="18" height="7" fill="#2ECC71" opacity="0.5"/>

    <text x="100" y="22" fill="#E8ECF0" font-size="24" font-weight="900" letter-spacing="3">FITTER WELDER PRO</text>
    <text x="100" y="44" fill="#55607A" font-size="11" font-weight="600" letter-spacing="3">ISO PARSER · DIM CHAIN · QA STAMP</text>
  </g>

  <!-- Bottom-right: CTA chip -->
  <g transform="translate(900, 1360)">
    <rect x="0" y="0" width="260" height="64" rx="32" fill="#F5A623"/>
    <rect x="0" y="0" width="260" height="64" rx="32" fill="none" stroke="#E8C14B" stroke-width="1.5"/>

    <!-- Play triangle (Google Play) -->
    <polygon points="28,18 28,46 52,32" fill="#0F1115"/>

    <!-- Apple silhouette glyph -->
    <path d="M 72 22 C 70 22 68 24 68 27 C 68 30 70 32 70 36 C 70 40 72 44 75 44 C 77 44 78 43 80 43 C 82 43 83 44 85 44 C 88 44 90 40 90 36 C 90 32 92 30 92 27 C 92 24 90 22 88 22 C 86 22 85 23 83 23 C 81 23 80 22 78 22 C 76 22 74 22 72 22 Z" fill="#0F1115"/>
    <path d="M 82 19 C 82 17 84 15 86 15 C 86 17 84 19 82 19 Z" fill="#0F1115"/>

    <text x="115" y="29" fill="#0F1115" font-size="14" font-weight="700" letter-spacing="2">POBIERZ</text>
    <text x="115" y="50" fill="#0F1115" font-size="14" font-weight="700" letter-spacing="2">GET IT</text>

    <!-- Arrow -->
    <path d="M 220 32 L 240 32 M 232 24 L 240 32 L 232 40" stroke="#0F1115" stroke-width="2.5" fill="none" stroke-linecap="square"/>
  </g>

  <!-- Bottom corner badge -->
  <text x="40" y="1475" fill="#55607A" font-size="10" font-weight="500" letter-spacing="2">v1.0 · BANNER 05 · TESTIMONIAL · 1200×1500</text>
  <text x="1160" y="1475" fill="#55607A" font-size="10" font-weight="500" text-anchor="end" letter-spacing="2">made for the field · zrobione na budowie</text>
</svg>
