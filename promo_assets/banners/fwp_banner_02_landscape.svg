<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1115"/>
      <stop offset="1" stop-color="#161924"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F5A623"/>
      <stop offset="1" stop-color="#E8C14B"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F2331"/>
      <stop offset="1" stop-color="#13151D"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="628" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <g stroke="#2C3354" stroke-width="0.5" opacity="0.18">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="120" y1="0" x2="120" y2="628"/>
    <line x1="240" y1="0" x2="240" y2="628"/>
    <line x1="360" y1="0" x2="360" y2="628"/>
    <line x1="480" y1="0" x2="480" y2="628"/>
    <line x1="720" y1="0" x2="720" y2="628"/>
    <line x1="840" y1="0" x2="840" y2="628"/>
    <line x1="960" y1="0" x2="960" y2="628"/>
    <line x1="1080" y1="0" x2="1080" y2="628"/>
  </g>

  <!-- Vertical divider hint -->
  <line x1="600" y1="100" x2="600" y2="528" stroke="#2C3354" stroke-width="1" opacity="0.4" stroke-dasharray="2 6"/>

  <!-- HEADLINE TOP -->
  <g>
    <text x="60" y="78" fill="#E8ECF0" font-size="36" font-weight="900" letter-spacing="-0.5">Czyta ISO tak jak Ty.</text>
    <text x="60" y="108" fill="#9BA3C7" font-size="20" font-weight="500" letter-spacing="0.2">Reads ISO the way you do.</text>
  </g>

  <!-- LEFT HALF: ISO pipe isometric drawing -->
  <g transform="translate(60, 150)">
    <!-- Drawing frame -->
    <rect x="0" y="0" width="500" height="380" rx="10" fill="#1A1D26" stroke="#2C3354" stroke-width="1.5"/>

    <!-- Title bar of drawing -->
    <rect x="0" y="0" width="500" height="34" rx="10" fill="#13151D"/>
    <rect x="0" y="24" width="500" height="10" fill="#13151D"/>
    <text x="16" y="22" fill="#9BA3C7" font-size="11" font-weight="700" letter-spacing="1.4">ISO-DWG · LINE 14-A · DN80 · S/40</text>
    <text x="380" y="22" fill="#55607A" font-size="11" font-weight="600" letter-spacing="0.8">REV.02</text>

    <!-- Isometric pipe drawing (white-on-dark vector) -->
    <g stroke="#E8ECF0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- horizontal run 1 (5x200) -->
      <line x1="60" y1="240" x2="320" y2="120"/>
      <!-- elbow up -->
      <path d="M 320 120 Q 340 110 350 90"/>
      <!-- vertical riser (150) -->
      <line x1="350" y1="90" x2="420" y2="50"/>
      <!-- flange detail at end -->
      <line x1="420" y1="50" x2="438" y2="40"/>
      <line x1="438" y1="40" x2="438" y2="62"/>
      <line x1="438" y1="40" x2="450" y2="34"/>
      <line x1="438" y1="62" x2="450" y2="56"/>
      <line x1="450" y1="34" x2="450" y2="56"/>
      <!-- start flange -->
      <line x1="60" y1="240" x2="48" y2="246"/>
      <line x1="48" y1="246" x2="48" y2="266"/>
      <line x1="60" y1="240" x2="60" y2="260"/>
      <line x1="48" y1="266" x2="60" y2="260"/>
    </g>

    <!-- Pipe wall second line (showing thickness) -->
    <g stroke="#9BA3C7" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.55">
      <line x1="64" y1="248" x2="318" y2="128"/>
      <line x1="354" y1="98" x2="420" y2="58"/>
    </g>

    <!-- Segment tick marks every 200 mm -->
    <g stroke="#F5A623" stroke-width="1.5" opacity="0.9">
      <line x1="112" y1="216" x2="116" y2="228"/>
      <line x1="164" y1="192" x2="168" y2="204"/>
      <line x1="216" y1="168" x2="220" y2="180"/>
      <line x1="268" y1="144" x2="272" y2="156"/>
      <line x1="320" y1="120" x2="324" y2="132"/>
    </g>

    <!-- Dimension callout 1450 mm -->
    <g>
      <line x1="40" y1="290" x2="430" y2="100" stroke="#F5A623" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="40" y1="284" x2="40" y2="296" stroke="#F5A623" stroke-width="1.5"/>
      <line x1="430" y1="94" x2="430" y2="106" stroke="#F5A623" stroke-width="1.5"/>
      <rect x="186" y="178" width="118" height="32" rx="6" fill="#0F1115" stroke="#F5A623" stroke-width="1.5"/>
      <text x="245" y="200" fill="#F5A623" font-size="18" font-weight="900" text-anchor="middle" letter-spacing="0.6">1450 mm</text>
    </g>

    <!-- Segment breakdown small -->
    <g font-size="10" font-weight="600" fill="#9BA3C7" letter-spacing="0.4">
      <text x="76" y="262">5 × 200</text>
      <text x="360" y="78">+ 150</text>
    </g>

    <!-- Iso axes legend bottom-left -->
    <g transform="translate(28, 340)">
      <line x1="0" y1="0" x2="22" y2="-12" stroke="#55607A" stroke-width="1.2"/>
      <line x1="0" y1="0" x2="-22" y2="-12" stroke="#55607A" stroke-width="1.2"/>
      <line x1="0" y1="0" x2="0" y2="-22" stroke="#55607A" stroke-width="1.2"/>
      <text x="26" y="-12" fill="#55607A" font-size="9" font-weight="700">X</text>
      <text x="-32" y="-12" fill="#55607A" font-size="9" font-weight="700">Y</text>
      <text x="3" y="-24" fill="#55607A" font-size="9" font-weight="700">Z</text>
    </g>

    <!-- Welder stamp -->
    <g transform="translate(360, 332)">
      <rect x="0" y="0" width="120" height="34" rx="4" fill="#0F1115" stroke="#2C3354" stroke-width="1"/>
      <text x="10" y="14" fill="#55607A" font-size="8" font-weight="700" letter-spacing="1">WELDER · WP</text>
      <text x="10" y="28" fill="#E8ECF0" font-size="13" font-weight="900" letter-spacing="1.2">JK-014</text>
      <circle cx="100" cy="17" r="9" fill="none" stroke="#2ECC71" stroke-width="1.5"/>
      <path d="M 96 17 L 99 20 L 105 14" stroke="#2ECC71" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Spec data bottom -->
    <g font-size="10" font-weight="600" letter-spacing="0.5">
      <text x="170" y="352" fill="#55607A">MAT</text>
      <text x="170" y="364" fill="#E8ECF0">P235GH</text>
      <text x="230" y="352" fill="#55607A">AMP</text>
      <text x="230" y="364" fill="#E8ECF0">140 A</text>
      <text x="285" y="352" fill="#55607A">PRE-HEAT</text>
      <text x="285" y="364" fill="#E8ECF0">150 °C</text>
    </g>
  </g>

  <!-- ORANGE ARROW pointing right -->
  <g transform="translate(560, 340)">
    <path d="M 0 0 L 50 0 L 50 -10 L 80 6 L 50 22 L 50 12 L 0 12 Z" fill="url(#orangeGrad)"/>
    <text x="14" y="-14" fill="#F5A623" font-size="10" font-weight="800" letter-spacing="1.4">PARSE</text>
  </g>

  <!-- RIGHT HALF: Phone mockup -->
  <g transform="translate(700, 130)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="340" height="420" rx="36" fill="#0A0C12" stroke="#2C3354" stroke-width="2"/>
    <rect x="10" y="10" width="320" height="400" rx="28" fill="url(#phoneGrad)"/>
    <!-- Notch -->
    <rect x="140" y="10" width="60" height="14" rx="7" fill="#0A0C12"/>

    <!-- App top bar -->
    <g transform="translate(10, 30)">
      <rect x="0" y="0" width="320" height="44" fill="#13151D"/>
      <circle cx="22" cy="22" r="11" fill="#F5A623"/>
      <path d="M 17 22 L 22 17 L 27 22 L 25 22 L 25 27 L 19 27 L 19 22 Z" fill="#0F1115"/>
      <text x="44" y="20" fill="#E8ECF0" font-size="12" font-weight="800" letter-spacing="0.6">SEGMENT PARSER</text>
      <text x="44" y="34" fill="#55607A" font-size="9" font-weight="600" letter-spacing="0.5">LINE 14-A · DN80</text>
      <circle cx="294" cy="22" r="8" fill="none" stroke="#9BA3C7" stroke-width="1.3"/>
      <line x1="294" y1="18" x2="294" y2="26" stroke="#9BA3C7" stroke-width="1.3"/>
      <line x1="290" y1="22" x2="298" y2="22" stroke="#9BA3C7" stroke-width="1.3"/>
    </g>

    <!-- Input row -->
    <g transform="translate(22, 90)">
      <rect x="0" y="0" width="296" height="44" rx="8" fill="#0F1115" stroke="#2C3354" stroke-width="1"/>
      <text x="12" y="18" fill="#55607A" font-size="9" font-weight="700" letter-spacing="0.8">INPUT</text>
      <text x="12" y="34" fill="#E8ECF0" font-size="14" font-weight="700" font-family="ui-monospace, Consolas, monospace">5(200)+150 mm</text>
      <rect x="252" y="10" width="36" height="24" rx="4" fill="#F5A623"/>
      <text x="270" y="26" fill="#0F1115" font-size="10" font-weight="900" text-anchor="middle" letter-spacing="0.6">RUN</text>
    </g>

    <!-- Result block (highlighted) -->
    <g transform="translate(22, 150)">
      <rect x="0" y="0" width="296" height="78" rx="10" fill="#0F1115" stroke="#F5A623" stroke-width="2"/>
      <rect x="0" y="0" width="6" height="78" rx="3" fill="#F5A623"/>
      <text x="18" y="20" fill="#9BA3C7" font-size="9" font-weight="700" letter-spacing="1">RESULT · TOTAL LENGTH</text>
      <text x="18" y="52" fill="#E8ECF0" font-size="22" font-weight="900" font-family="ui-monospace, Consolas, monospace">5 × 200 + 150</text>
      <text x="18" y="70" fill="#F5A623" font-size="14" font-weight="900" letter-spacing="0.5">= 1450 mm</text>
      <!-- Check badge -->
      <circle cx="270" cy="40" r="14" fill="#2ECC71"/>
      <path d="M 263 40 L 268 45 L 277 35" stroke="#0F1115" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Segment list -->
    <g transform="translate(22, 244)">
      <text x="0" y="0" fill="#55607A" font-size="9" font-weight="700" letter-spacing="1">SEGMENTS</text>

      <g transform="translate(0, 12)">
        <rect x="0" y="0" width="296" height="22" rx="5" fill="#13151D"/>
        <text x="10" y="15" fill="#9BA3C7" font-size="10" font-weight="700">#1</text>
        <text x="38" y="15" fill="#E8ECF0" font-size="10" font-weight="700" font-family="ui-monospace, Consolas, monospace">200 mm</text>
        <text x="240" y="15" fill="#2ECC71" font-size="9" font-weight="800" letter-spacing="0.5">OK</text>
      </g>
      <g transform="translate(0, 38)">
        <rect x="0" y="0" width="296" height="22" rx="5" fill="#13151D"/>
        <text x="10" y="15" fill="#9BA3C7" font-size="10" font-weight="700">#2</text>
        <text x="38" y="15" fill="#E8ECF0" font-size="10" font-weight="700" font-family="ui-monospace, Consolas, monospace">200 mm</text>
        <text x="240" y="15" fill="#2ECC71" font-size="9" font-weight="800" letter-spacing="0.5">OK</text>
      </g>
      <g transform="translate(0, 64)">
        <rect x="0" y="0" width="296" height="22" rx="5" fill="#13151D"/>
        <text x="10" y="15" fill="#9BA3C7" font-size="10" font-weight="700">#3</text>
        <text x="38" y="15" fill="#E8ECF0" font-size="10" font-weight="700" font-family="ui-monospace, Consolas, monospace">200 mm</text>
        <text x="240" y="15" fill="#2ECC71" font-size="9" font-weight="800" letter-spacing="0.5">OK</text>
      </g>
      <g transform="translate(0, 90)">
        <rect x="0" y="0" width="296" height="22" rx="5" fill="#13151D"/>
        <text x="10" y="15" fill="#9BA3C7" font-size="10" font-weight="700">#6</text>
        <text x="38" y="15" fill="#E8ECF0" font-size="10" font-weight="700" font-family="ui-monospace, Consolas, monospace">150 mm</text>
        <text x="232" y="15" fill="#E8C14B" font-size="9" font-weight="800" letter-spacing="0.5">RISER</text>
      </g>
    </g>

    <!-- Home indicator -->
    <rect x="135" y="396" width="70" height="4" rx="2" fill="#2C3354"/>
  </g>

  <!-- LOGO + WORDMARK (bottom right) -->
  <g transform="translate(900, 568)">
    <!-- Mini logo: iso-pipe elbow + welder mask silhouette -->
    <g>
      <!-- elbow path -->
      <path d="M 0 14 L 12 14 Q 20 14 20 6 L 20 -4" stroke="#F5A623" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- mask silhouette -->
      <path d="M 28 -2 Q 28 -10 36 -10 L 46 -10 Q 54 -10 54 -2 L 54 12 Q 54 18 48 18 L 34 18 Q 28 18 28 12 Z" fill="#1A1D26" stroke="#E8ECF0" stroke-width="1.4"/>
      <rect x="32" y="1" width="18" height="5" rx="1" fill="#F5A623"/>
    </g>
    <text x="68" y="2" fill="#E8ECF0" font-size="13" font-weight="900" letter-spacing="2">FITTER WELDER</text>
    <text x="68" y="18" fill="#F5A623" font-size="13" font-weight="900" letter-spacing="3.5">PRO</text>
  </g>

  <!-- CTA chip bottom-left -->
  <g transform="translate(60, 552)">
    <rect x="0" y="0" width="200" height="44" rx="22" fill="#F5A623"/>
    <text x="18" y="28" fill="#0F1115" font-size="14" font-weight="900" letter-spacing="0.4">Pobierz / Get it</text>
    <!-- Play triangle -->
    <g transform="translate(140, 22)">
      <polygon points="0,-8 0,8 11,0" fill="#0F1115"/>
    </g>
    <!-- Apple silhouette -->
    <g transform="translate(168, 22)">
      <path d="M 0 -4 Q -6 -4 -6 2 Q -6 9 -1 9 Q 1 9 2 8 Q 3 9 5 9 Q 10 9 10 2 Q 10 -4 4 -4 Q 2 -4 1 -3 Q 0 -4 0 -4 Z" fill="#0F1115"/>
      <path d="M 3 -8 Q 3 -5 6 -5 Q 6 -8 3 -8 Z" fill="#0F1115"/>
    </g>
  </g>

  <!-- Tiny corner tag -->
  <text x="1140" y="22" fill="#55607A" font-size="9" font-weight="700" letter-spacing="1.5" text-anchor="end">ISO · DIN · PN-EN</text>
</svg>
