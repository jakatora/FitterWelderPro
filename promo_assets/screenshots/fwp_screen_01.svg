<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8C14B"/>
    </linearGradient>
    <linearGradient id="captionGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8C14B"/>
    </linearGradient>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2330"/>
      <stop offset="100%" stop-color="#1A1D26"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1290" height="2796" fill="#0F1115"/>

  <!-- Phone frame -->
  <rect x="8" y="8" width="1274" height="2780" rx="80" ry="80" fill="#000000" stroke="#2C3354" stroke-width="2"/>
  <rect x="24" y="24" width="1242" height="2748" rx="64" ry="64" fill="#0F1115"/>

  <!-- Status bar -->
  <g>
    <text x="100" y="86" fill="#E8ECF0" font-size="36" font-weight="700">09:41</text>
    <!-- Dynamic island -->
    <rect x="525" y="42" width="240" height="56" rx="28" ry="28" fill="#000000"/>
    <!-- Signal bars -->
    <rect x="1050" y="68" width="8" height="10" fill="#E8ECF0"/>
    <rect x="1062" y="62" width="8" height="16" fill="#E8ECF0"/>
    <rect x="1074" y="56" width="8" height="22" fill="#E8ECF0"/>
    <rect x="1086" y="50" width="8" height="28" fill="#E8ECF0"/>
    <!-- Wifi -->
    <path d="M1110 70 q14 -16 28 0 M1116 76 q8 -10 16 0" stroke="#E8ECF0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="1124" cy="82" r="3" fill="#E8ECF0"/>
    <!-- Battery -->
    <rect x="1160" y="58" width="60" height="28" rx="6" ry="6" fill="none" stroke="#E8ECF0" stroke-width="3"/>
    <rect x="1222" y="66" width="4" height="12" fill="#E8ECF0"/>
    <rect x="1164" y="62" width="48" height="20" rx="2" ry="2" fill="#2ECC71"/>
  </g>

  <!-- App Bar -->
  <g transform="translate(0,120)">
    <rect x="24" y="0" width="1242" height="180" fill="#1A1D26"/>
    <text x="60" y="116" fill="url(#titleGrad)" font-size="56" font-weight="800" letter-spacing="2">FITTER WELDER PRO</text>

    <!-- Welder badge icon (gold) -->
    <g transform="translate(1000,52)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="76" height="76" rx="16" ry="16" fill="#1F2330" stroke="#E8C14B" stroke-width="2"/>
      <!-- shield + spark -->
      <path d="M38 14 L60 24 V44 Q60 60 38 70 Q16 60 16 44 V24 Z" fill="#E8C14B"/>
      <text x="38" y="50" fill="#0F1115" font-size="28" font-weight="900" text-anchor="middle">JK</text>
    </g>

    <!-- EN/PL chip -->
    <g transform="translate(1092,52)">
      <rect x="0" y="0" width="100" height="76" rx="38" ry="38" fill="#1F2330" stroke="#2C3354" stroke-width="2"/>
      <text x="50" y="50" fill="#E8ECF0" font-size="30" font-weight="800" text-anchor="middle">PL</text>
    </g>

    <!-- Help -->
    <g transform="translate(1206,52)">
      <circle cx="38" cy="38" r="38" fill="#1F2330" stroke="#2C3354" stroke-width="2"/>
      <text x="38" y="54" fill="#E8C14B" font-size="40" font-weight="900" text-anchor="middle">?</text>
    </g>
  </g>

  <!-- Quick status strip (welder stamp + today's logs) -->
  <g transform="translate(60,330)">
    <rect x="0" y="0" width="1170" height="92" rx="20" ry="20" fill="#1A1D26" stroke="#2C3354" stroke-width="1.5"/>
    <circle cx="50" cy="46" r="14" fill="#2ECC71"/>
    <text x="84" y="42" fill="#9BA3C7" font-size="22" font-weight="500">Stempel spawacza</text>
    <text x="84" y="74" fill="#E8ECF0" font-size="30" font-weight="800">JK-014  •  WP-022</text>
    <line x1="620" y1="20" x2="620" y2="72" stroke="#2C3354" stroke-width="2"/>
    <text x="650" y="42" fill="#9BA3C7" font-size="22" font-weight="500">Dziś / Today</text>
    <text x="650" y="74" fill="#E8ECF0" font-size="30" font-weight="800">14 spoin  •  3.2 m  •  DN50–DN200</text>
  </g>

  <!-- Tiles 2x4 grid -->
  <!-- Grid origin at (60, 460). Tile 590x320 with 30px gap horizontally -->
  <g transform="translate(60,460)">

    <!-- Row 1 -->
    <!-- ISO SCANNER -->
    <g transform="translate(0,0)" filter="url(#cardShadow)">
      <rect width="590" height="320" rx="28" ry="28" fill="url(#tileGrad)" stroke="#2C3354" stroke-width="1.5"/>
      <!-- camera icon -->
      <g transform="translate(40,40)" fill="none" stroke="#F5A623" stroke-width="6">
        <rect x="0" y="20" width="120" height="84" rx="14" ry="14"/>
        <rect x="34" y="6" width="52" height="20" rx="6" ry="6" fill="#F5A623"/>
        <circle cx="60" cy="62" r="22"/>
        <circle cx="60" cy="62" r="10" fill="#F5A623"/>
      </g>
      <text x="40" y="220" fill="#E8ECF0" font-size="40" font-weight="800">ISO SCANNER</text>
      <text x="40" y="260" fill="#9BA3C7" font-size="26" font-weight="500">Scan drawing • DN/length</text>
      <text x="40" y="294" fill="#E8C14B" font-size="22" font-weight="700">DN15–DN300  •  100–5000 mm</text>
    </g>

    <!-- ZESZYT ISO -->
    <g transform="translate(620,0)" filter="url(#cardShadow)">
      <rect width="590" height="320" rx="28" ry="28" fill="url(#tileGrad)" stroke="#2C3354" stroke-width="1.5"/>
      <g transform="translate(40,32)" stroke="#F5A623" stroke-width="6" fill="none">
        <rect x="0" y="0" width="100" height="120" rx="10" ry="10"/>
        <line x1="20" y1="34" x2="80" y2="34"/>
        <line x1="20" y1="58" x2="80" y2="58"/>
        <line x1="20" y1="82" x2="60" y2="82"/>
        <rect x="-10" y="20" width="20" height="80" fill="#F5A623"/>
      </g>
      <text x="40" y="220" fill="#E8ECF0" font-size="40" font-weight="800">ZESZYT ISO</text>
      <text x="40" y="260" fill="#9BA3C7" font-size="26" font-weight="500">ISO notebook • offline</text>
      <text x="40" y="294" fill="#E8C14B" font-size="22" font-weight="700">47 rysunków  •  PDF export</text>
    </g>

    <!-- Row 2 -->
    <!-- DZIENNIK SPOIN -->
    <g transform="translate(0,350)" filter="url(#cardShadow)">
      <rect width="590" height="320" rx="28" ry="28" fill="url(#tileGrad)" stroke="#2C3354" stroke-width="1.5"/>
      <g transform="translate(40,30)">
        <polygon points="60,0 110,28 110,84 60,124 10,84 10,28" fill="none" stroke="#F5A623" stroke-width="6"/>
        <text x="60" y="80" fill="#F5A623" font-size="44" font-weight="900" text-anchor="middle">14</text>
      </g>
      <text x="40" y="220" fill="#E8ECF0" font-size="40" font-weight="800">DZIENNIK SPOIN</text>
      <text x="40" y="260" fill="#9BA3C7" font-size="26" font-weight="500">Weld log • 135 / 141 / 111</text>
      <text x="40" y="294" fill="#E8C14B" font-size="22" font-weight="700">AMP 80–220  •  °C 100–900</text>
    </g>

    <!-- KALKULATORY -->
    <g transform="translate(620,350)" filter="url(#cardShadow)">
      <rect width="590" height="320" rx="28" ry="28" fill="url(#tileGrad)" stroke="#2C3354" stroke-width="1.5"/>
      <g transform="translate(40,30)" fill="none" stroke="#F5A623" stroke-width="6">
        <rect x="0" y="0" width="120" height="140" rx="14" ry="14"/>
        <rect x="14" y="14" width="92" height="30" rx="4" ry="4" fill="#F5A623"/>
        <circle cx="30" cy="68" r="6" fill="#F5A623"/>
        <circle cx="60" cy="68" r="6" fill="#F5A623"/>
        <circle cx="90" cy="68" r="6" fill="#F5A623"/>
        <circle cx="30" cy="98" r="6" fill="#F5A623"/>
        <circle cx="60" cy="98" r="6" fill="#F5A623"/>
        <circle cx="90" cy="98" r="6" fill="#F5A623"/>
        <circle cx="30" cy="128" r="6" fill="#F5A623"/>
        <circle cx="60" cy="128" r="6" fill="#F5A623"/>
        <circle cx="90" cy="128" r="6" fill="#F5A623"/>
      </g>
      <text x="40" y="220" fill="#E8ECF0" font-size="40" font-weight="800">KALKULATORY</text>
      <text x="40" y="260" fill="#9BA3C7" font-size="26" font-weight="500">Calculators • 12 modules</text>
      <text x="40" y="294" fill="#E8C14B" font-size="22" font-weight="700">offset • mitre • flange</text>
    </g>

    <!-- Row 3 -->
    <!-- CHAT AI (with PRO badge) -->
    <g transform="translate(0,700)" filter="url(#cardShadow)">
      <rect width="590" height="320" rx="28" ry="28" fill="url(#tileGrad)" stroke="#E8C14B" stroke-width="2"/>
      <g transform="translate(40,32)" fill="none" stroke="#F5A623" stroke-width="6">
        <path d="M0 30 Q0 0 30 0 H100 Q130 0 130 30 V70 Q130 100 100 100 H50 L20 130 V100 H30 Q0 100 0 70 Z"/>
        <circle cx="40" cy="50" r="6" fill="#F5A623"/>
        <circle cx="65" cy="50" r="6" fill="#F5A623"/>
        <circle cx="90" cy="50" r="6" fill="#F5A623"/>
      </g>
      <!-- PRO badge -->
      <g transform="translate(440,30)">
        <rect x="0" y="0" width="120" height="48" rx="24" ry="24" fill="#E8C14B"/>
        <text x="60" y="34" fill="#0F1115" font-size="28" font-weight="900" text-anchor="middle">PRO</text>
      </g>
      <text x="40" y="220" fill="#E8ECF0" font-size="40" font-weight="800">CHAT AI</text>
      <text x="40" y="260" fill="#9BA3C7" font-size="26" font-weight="500">Ask anything • WPS, norms</text>
      <text x="40" y="294" fill="#E8C14B" font-size="22" font-weight="700">EN 1090 • ISO 5817 • PED</text>
    </g>

    <!-- MATERIAŁY -->
    <g transform="translate(620,700)" filter="url(#cardShadow)">
      <rect width="590" height="320" rx="28" ry="28" fill="url(#tileGrad)" stroke="#2C3354" stroke-width="1.5"/>
      <g transform="translate(40,30)" fill="none" stroke="#F5A623" stroke-width="6">
        <polygon points="0,40 60,10 120,40 120,110 60,140 0,110" />
        <line x1="0" y1="40" x2="60" y2="70"/>
        <line x1="60" y1="70" x2="120" y2="40"/>
        <line x1="60" y1="70" x2="60" y2="140"/>
      </g>
      <text x="40" y="220" fill="#E8ECF0" font-size="40" font-weight="800">MATERIAŁY</text>
      <text x="40" y="260" fill="#9BA3C7" font-size="26" font-weight="500">Stock • pipes, flanges, elbows</text>
      <text x="40" y="294" fill="#E8C14B" font-size="22" font-weight="700">DN50 / DN100 / DN200</text>
    </g>

    <!-- Row 4 -->
    <!-- CIĘCIE Z PRĘTÓW -->
    <g transform="translate(0,1050)" filter="url(#cardShadow)">
      <rect width="590" height="320" rx="28" ry="28" fill="url(#tileGrad)" stroke="#2C3354" stroke-width="1.5"/>
      <g transform="translate(40,38)" fill="none" stroke="#F5A623" stroke-width="6">
        <rect x="0" y="46" width="140" height="24" rx="4" ry="4" fill="#F5A623"/>
        <polygon points="0,46 10,30 30,30 40,46" />
        <polygon points="40,46 50,30 70,30 80,46" />
        <polygon points="80,46 90,30 110,30 120,46" />
        <line x1="0" y1="92" x2="140" y2="92"/>
      </g>
      <text x="40" y="220" fill="#E8ECF0" font-size="40" font-weight="800">CIĘCIE Z PRĘTÓW</text>
      <text x="40" y="260" fill="#9BA3C7" font-size="26" font-weight="500">Bar cutting • waste &lt; 4%</text>
      <text x="40" y="294" fill="#E8C14B" font-size="22" font-weight="700">6000 mm  →  reszta 184 mm</text>
    </g>

    <!-- POMOC -->
    <g transform="translate(620,1050)" filter="url(#cardShadow)">
      <rect width="590" height="320" rx="28" ry="28" fill="url(#tileGrad)" stroke="#2C3354" stroke-width="1.5"/>
      <g transform="translate(40,30)" fill="none" stroke="#F5A623" stroke-width="6">
        <circle cx="60" cy="60" r="56"/>
        <path d="M36 46 Q36 22 60 22 Q86 22 86 50 Q86 64 70 70 Q60 74 60 88" stroke-linecap="round"/>
        <circle cx="60" cy="106" r="6" fill="#F5A623"/>
      </g>
      <text x="40" y="220" fill="#E8ECF0" font-size="40" font-weight="800">POMOC</text>
      <text x="40" y="260" fill="#9BA3C7" font-size="26" font-weight="500">Help • tutorials, FAQ</text>
      <text x="40" y="294" fill="#E8C14B" font-size="22" font-weight="700">24/7 support  •  PL / EN</text>
    </g>
  </g>

  <!-- Bottom nav hint -->
  <g transform="translate(60,2370)">
    <rect width="1170" height="120" rx="28" ry="28" fill="#1A1D26" stroke="#2C3354" stroke-width="1.5"/>
    <g transform="translate(40,30)">
      <rect width="60" height="60" rx="14" ry="14" fill="#F5A623"/>
      <text x="30" y="42" fill="#0F1115" font-size="34" font-weight="900" text-anchor="middle">⌂</text>
    </g>
    <text x="120" y="68" fill="#E8ECF0" font-size="28" font-weight="800">Menu</text>
    <text x="240" y="50" fill="#9BA3C7" font-size="22" font-weight="500">Dziennik</text>
    <text x="240" y="86" fill="#55607A" font-size="20" font-weight="500">Weld log</text>
    <text x="440" y="50" fill="#9BA3C7" font-size="22" font-weight="500">Skanuj</text>
    <text x="440" y="86" fill="#55607A" font-size="20" font-weight="500">Scan</text>
    <text x="630" y="50" fill="#9BA3C7" font-size="22" font-weight="500">Materiały</text>
    <text x="630" y="86" fill="#55607A" font-size="20" font-weight="500">Stock</text>
    <text x="850" y="50" fill="#9BA3C7" font-size="22" font-weight="500">Profil</text>
    <text x="850" y="86" fill="#55607A" font-size="20" font-weight="500">Profile</text>
    <g transform="translate(1040,30)">
      <rect width="90" height="60" rx="30" ry="30" fill="#1F2330" stroke="#E8C14B" stroke-width="2"/>
      <text x="45" y="42" fill="#E8C14B" font-size="26" font-weight="900" text-anchor="middle">PRO</text>
    </g>
  </g>

  <!-- Caption banner -->
  <g transform="translate(0,2540)">
    <rect x="0" y="0" width="1290" height="200" fill="url(#captionGrad)"/>
    <text x="645" y="92" fill="#0F1115" font-size="64" font-weight="900" text-anchor="middle">Wszystko, czego monter potrzebuje. W jednej kieszeni.</text>
    <text x="645" y="156" fill="#1A1D26" font-size="44" font-weight="600" text-anchor="middle">Everything a fitter needs. In one pocket.</text>
  </g>

  <!-- Home indicator -->
  <rect x="495" y="2740" width="300" height="10" rx="5" ry="5" fill="#E8ECF0" opacity="0.7"/>
</svg>
