<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E5E7EB"/>
      <stop offset="1" stop-color="#9CA3AF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <pattern id="stripes" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(20)">
      <rect width="24" height="24" fill="transparent"/>
      <rect x="0" y="0" width="10" height="24" fill="#FFFFFF" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="500" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="500" fill="url(#stripes)"/>

  <!-- Decorative "pipe" line (simple, neutral) -->
  <g opacity="0.9" filter="url(#softShadow)">
    <path d="M70 350 C 220 280, 310 390, 450 330 S 720 290, 940 340" stroke="url(#steel)" stroke-width="18" stroke-linecap="round"/>
    <path d="M70 350 C 220 280, 310 390, 450 330 S 720 290, 940 340" stroke="#111827" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Left badge -->
  <g transform="translate(64,64)" filter="url(#softShadow)">
    <rect x="0" y="0" width="140" height="140" rx="28" fill="#0F172A" stroke="#E5E7EB" stroke-opacity="0.18"/>
    <!-- Minimal "spark" icon -->
    <g transform="translate(70,72)">
      <path d="M0 -34 L6 -10 L30 -16 L10 2 L30 18 L6 12 L0 36 L-6 12 L-30 18 L-10 2 L-30 -16 L-6 -10 Z" fill="#E5E7EB" opacity="0.92"/>
      <circle cx="0" cy="0" r="7" fill="#9CA3AF" opacity="0.9"/>
    </g>
    <text x="70" y="132" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#E5E7EB" opacity="0.88">
      PRO
    </text>
  </g>

  <!-- Text block -->
  <g transform="translate(232,88)">
    <text x="0" y="0" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#F9FAFB">
      Fitter Welder Pro
    </text>
    <text x="0" y="42" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="20" fill="#E5E7EB" opacity="0.92">
      Listy cięcia i parametry spawania
    </text>

    <!-- Feature bullets -->
    <g transform="translate(0,80)" fill="#E5E7EB" opacity="0.92">
      <circle cx="8" cy="8" r="6" fill="#9CA3AF" opacity="0.9"/>
      <text x="26" y="14" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18">Projekty • Segmenty • Obliczenia cięcia</text>

      <circle cx="8" cy="44" r="6" fill="#9CA3AF" opacity="0.9"/>
      <text x="26" y="50" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18">WPS / parametry spawania pod ręką</text>
    </g>
  </g>

  <!-- Safe margin guide (hidden) -->
  <!-- <rect x="48" y="48" width="928" height="404" stroke="#FFFFFF" stroke-opacity="0.15"/> -->
</svg>
