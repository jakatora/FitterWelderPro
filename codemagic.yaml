workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.jakatora.fitterwelderpro
        APPLE_TEAM_ID: B7J6A7R258
        APP_PROVISIONING_PROFILE_NAME: FitterWelderPro_AppStore
        KEYCHAIN_PASSWORD: keychain_codemagic_2026
      groups:
        - ios_signing

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Create AppStore.xcconfig
        script: |
          cat > ios/Flutter/AppStore.xcconfig << EOF
          APP_BUNDLE_IDENTIFIER=$BUNDLE_ID
          APPLE_TEAM_ID=$APPLE_TEAM_ID
          EOF
          echo "Created AppStore.xcconfig:"
          cat ios/Flutter/AppStore.xcconfig

      - name: Install certificate and provisioning profile
        script: |
          set -eo pipefail
          CERT_PATH=/tmp/distribution.p12
          PROFILE_PATH=/tmp/profile.mobileprovision
          KEYCHAIN_PATH=/tmp/app-signing.keychain-db

          echo -n "$CM_CERTIFICATE" | base64 -D > $CERT_PATH
          echo -n "$CM_PROVISIONING_PROFILE" | base64 -D > $PROFILE_PATH

          CERT_SIZE=$(wc -c < $CERT_PATH | tr -d ' ')
          PROFILE_SIZE=$(wc -c < $PROFILE_PATH | tr -d ' ')
          echo "Cert size: $CERT_SIZE bytes"
          echo "Profile size: $PROFILE_SIZE bytes"

          if [ "$CERT_SIZE" -eq 0 ]; then
            echo "ERROR: CM_CERTIFICATE is empty — check ios_signing group in Codemagic"
            exit 1
          fi
          if [ "$PROFILE_SIZE" -eq 0 ]; then
            echo "ERROR: CM_PROVISIONING_PROFILE is empty — check ios_signing group in Codemagic"
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$CM_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH -T /usr/bin/codesign
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "=== Signing identities ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH

          PROFILE_UUID=$(security cms -D -i $PROFILE_PATH | plutil -extract UUID raw -)
          PROFILE_NAME=$(security cms -D -i $PROFILE_PATH | plutil -extract Name raw -)
          echo "Profile UUID: $PROFILE_UUID"
          echo "Profile Name: $PROFILE_NAME"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Installed profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV

      - name: Flutter build iOS (no codesign)
        script: flutter build ios --release --no-codesign

      - name: Archive and export IPA
        script: |
          set -eo pipefail
          echo "Flutter root (from Codemagic): $FLUTTER_ROOT"
          echo "Using profile UUID: $PROFILE_UUID"

          mkdir -p /tmp/xcodebuild_logs

          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -archivePath build/ios/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            -derivedDataPath /tmp/derivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID \
            PROVISIONING_PROFILE=$PROFILE_UUID \
            PROVISIONING_PROFILE_SPECIFIER=$APP_PROVISIONING_PROFILE_NAME \
            FLUTTER_ROOT=$FLUTTER_ROOT \
            archive 2>&1 | tee /tmp/xcodebuild_logs/archive.log

          cat > /tmp/ExportOptions.plist << PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key><string>$APP_PROVISIONING_PROFILE_NAME</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>uploadBitcode</key><false/>
          </dict>
          </plist>
          PLISTEOF

          echo "=== ExportOptions.plist ==="
          cat /tmp/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            2>&1 | tee /tmp/xcodebuild_logs/export.log

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
