workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    # Codemagic-managed automatic iOS code signing. Combined with the Admin
    # App Store Connect API key registered as `codemagic`, Codemagic generates
    # the private key, issues / refreshes the Apple Distribution cert, creates
    # / refreshes the App Store provisioning profile for the bundle ID, and
    # keeps everything on its side. No .p12, no CSR, no env var with a key,
    # no manual upload. When the cert expires in 12 months the next build
    # renews it automatically.
    integrations:
      app_store_connect: codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jakatora.fitterwelderpro
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.jakatora.fitterwelderpro
        APPLE_TEAM_ID: B7J6A7R258

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Create AppStore.xcconfig
        script: |
          cat > ios/Flutter/AppStore.xcconfig << EOF
          APP_BUNDLE_IDENTIFIER=$BUNDLE_ID
          APPLE_TEAM_ID=$APPLE_TEAM_ID
          EOF

      - name: Build IPA
        script: |
          set -eo pipefail
          mkdir -p /tmp/xcodebuild_logs

          # ExportOptions.plist was written by Codemagic's automatic signing
          # pre-check using the cert + profile it just issued / fetched.
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist \
            2>&1 | tee /tmp/xcodebuild_logs/build.log

          echo "=== IPA output ==="
          ls -lh build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
