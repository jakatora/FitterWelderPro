workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.jakatora.fitterwelderpro
        APPLE_TEAM_ID: B7J6A7R258
      groups:
        # CERTIFICATE_PRIVATE_KEY — base64-encoded 2048-bit RSA key.
        # Generated once locally, reused for the cert's 12-month lifetime.
        - ios_signing

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Create AppStore.xcconfig
        script: |
          cat > ios/Flutter/AppStore.xcconfig << EOF
          APP_BUNDLE_IDENTIFIER=$BUNDLE_ID
          APPLE_TEAM_ID=$APPLE_TEAM_ID
          EOF

      - name: Set up code signing
        script: |
          set -eo pipefail

          # ── Sanity check: did the env var reach the build? ──────────────
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "ERROR: CERTIFICATE_PRIVATE_KEY env var is empty or missing."
            echo "Check Codemagic UI → Team settings → Global variables and"
            echo "secrets. The variable must be:"
            echo "  - Name:  CERTIFICATE_PRIVATE_KEY"
            echo "  - Group: ios_signing"
            echo "  - Secure: ✓"
            exit 1
          fi
          echo "CERTIFICATE_PRIVATE_KEY received: ${#CERTIFICATE_PRIVATE_KEY} chars (base64)"

          # Materialize the private key into a file because the CLI flag
          # `--certificate-key=@file:…` is more reliable than `@env:…`
          # for multi-line PEM payloads.
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > "$HOME/apple_key.pem"
          chmod 600 "$HOME/apple_key.pem"

          KEY_SIZE=$(wc -c < "$HOME/apple_key.pem" | tr -d ' ')
          if [ "$KEY_SIZE" -lt 1000 ]; then
            echo "ERROR: decoded private key is too small ($KEY_SIZE bytes)."
            echo "The base64 value in CERTIFICATE_PRIVATE_KEY is probably"
            echo "truncated or wrapped. Re-paste the FULL one-line base64."
            exit 1
          fi
          echo "Decoded key: $KEY_SIZE bytes — looks OK."

          keychain initialize

          # Create (or reuse) the Apple Distribution cert tied to our
          # private key, and the App Store provisioning profile for
          # BUNDLE_ID. Admin App Store Connect API key required.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --certificate-key=@file:"$HOME/apple_key.pem" \
            --create

          keychain add-certificates

          xcode-project use-profiles \
            --export-options-plist "$CM_BUILD_DIR/export_options.plist"

          echo "=== ExportOptions.plist ==="
          cat "$CM_BUILD_DIR/export_options.plist"

      - name: Build IPA
        script: |
          set -eo pipefail
          mkdir -p /tmp/xcodebuild_logs

          # Auto-bump cfBundleVersion from Codemagic's built-in per-app build
          # counter. Apple rejects any TestFlight upload that reuses a
          # cfBundleVersion already seen on this app record — manual bumps are
          # error-prone (we shipped up to +11 by hand, then chased phantom
          # +12/+13 bumps that Codemagic either re-ran or shallow-cloned
          # around). The +1000 offset puts us safely above every historical
          # hand-rolled value (+1..+12).
          #
          # Codemagic env-var naming has drifted across CLI versions:
          #   - $CM_BUILD_NUMBER (legacy, still injected by yaml workflows)
          #   - $PROJECT_BUILD_NUMBER (current, primary in the new builder)
          #   - $BUILD_NUMBER (Codemagic UI workflows / API trigger)
          # Accept any of them; default to a Unix-timestamp-derived monotonic
          # value when ALL three are missing so manually-triggered re-runs
          # still produce a fresh number instead of failing the script.
          RAW_COUNTER="${PROJECT_BUILD_NUMBER:-${CM_BUILD_NUMBER:-${BUILD_NUMBER:-}}}"
          if [ -z "$RAW_COUNTER" ]; then
            # Seconds since 2026-01-01 — fits comfortably under cfBundleVersion's
            # 18-digit ceiling, monotonically increases on every script run.
            RAW_COUNTER=$(( $(date +%s) - 1767225600 ))
            echo "NOTE: no Codemagic build-number env var found, falling back to wall-clock counter $RAW_COUNTER"
          else
            echo "Using Codemagic counter $RAW_COUNTER (PROJECT_BUILD_NUMBER=$PROJECT_BUILD_NUMBER CM_BUILD_NUMBER=$CM_BUILD_NUMBER BUILD_NUMBER=$BUILD_NUMBER)"
          fi
          BUILD_NUMBER=$((RAW_COUNTER + 1000))
          echo "Using cfBundleVersion = $BUILD_NUMBER"

          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --build-name=0.1.6 \
            --export-options-plist="$CM_BUILD_DIR/export_options.plist" \
            2>&1 | tee /tmp/xcodebuild_logs/build.log

          echo "=== IPA output ==="
          ls -lh build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
