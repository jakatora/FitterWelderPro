name: iOS App Store Upload

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - pubspec.yaml
      - lib/**
      - ios/**
      - .github/workflows/ios-app-store.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-upload:
    runs-on: macos-latest
    env:
      APP_BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_ID }}
      APPLE_TEAM_ID: "87J6A79258"
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: "keychain_temp_2024"
      TESTFLIGHT_CHANGELOG: ${{ vars.TESTFLIGHT_CHANGELOG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Write App Store Connect API key to file
        run: |
          mkdir -p /tmp
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > /tmp/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          echo "APP_STORE_CONNECT_KEY_PATH=/tmp/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" >> $GITHUB_ENV

      - name: Install signing certificate and provisioning profile
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate and allow codesign to use the key (set-key-partition-list is REQUIRED on macOS 12+)
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH -T /usr/bin/codesign
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Extract UUID and Team ID from profile (TeamIdentifier is an array → use index .0)
          PROFILE_UUID=$(security cms -D -i $PROFILE_PATH | plutil -extract UUID raw -)
          PROFILE_TEAM=$(security cms -D -i $PROFILE_PATH | plutil -extract TeamIdentifier.0 raw -)
          echo "Profile UUID:   $PROFILE_UUID"
          echo "Profile Team:   $PROFILE_TEAM"

          # Diagnostics — show what was imported
          echo "=== Signing identities in keychain ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH || true

          # Install profile with UUID filename (required by Xcode 16)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "PROFILE_UUID=${PROFILE_UUID}" >> $GITHUB_ENV
          echo "APPLE_TEAM_ID=${PROFILE_TEAM}" >> $GITHUB_ENV
          echo "Installed: ${PROFILE_UUID}.mobileprovision for team ${PROFILE_TEAM}"

      - name: Export FLUTTER_ROOT for Xcode build phases
        run: |
          FLUTTER_BIN=$(which flutter)
          FLUTTER_ROOT=$(dirname $(dirname $FLUTTER_BIN))
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> $GITHUB_ENV
          echo "Flutter root: $FLUTTER_ROOT"

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios

      - name: Build and upload to TestFlight
        working-directory: ios
        run: bundle exec fastlane ios release

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cut-list-app-ipa
          path: ios/build/ios/*.ipa
          if-no-files-found: ignore
